<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kapitał AI</title>

<style>

body {
    background:#09090b;
    color:white;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin:0;
    padding:20px;
}

h1 {
    font-size:32px;
}

.card {
    background:#18181b;
    border-radius:22px;
    padding:20px;
    margin-bottom:18px;
}

.balance {
    font-size:42px;
    font-weight:700;
}

button {
    width:100%;
    padding:15px;
    border-radius:15px;
    border:none;
    margin-top:10px;
    font-size:17px;
    font-weight:600;
}

.primary {
    background:white;
    color:black;
}

input {
    width:100%;
    box-sizing:border-box;
    padding:14px;
    border-radius:12px;
    border:none;
    background:#27272a;
    color:white;
    margin-top:8px;
}

.progress {
    height:12px;
    background:#27272a;
    border-radius:10px;
    overflow:hidden;
}

.progress div {
    height:100%;
    width:0%;
    background:white;
}

</style>

</head>

<body>

<h1>💰 Kapitał AI</h1>

<div class="card">
<p>Twoje oszczędności</p>
<div class="balance" id="money">
0 zł
</div>
</div>


<div class="card">

<h2>🎯 Cel</h2>

<input id="goalName" placeholder="np. iPhone 17">

<input id="goalValue" placeholder="Kwota celu" type="number">

<button class="primary" onclick="saveGoal()">
Ustaw cel
</button>

<p id="goalText"></p>

<div class="progress">
<div id="bar"></div>
</div>

</div>

<div class="card">

<h2>💸 Dodaj wydatek</h2>

<input id="expenseName" placeholder="np. paliwo">

<input id="expenseAmount" placeholder="Kwota" type="number">

<select id="category">
<option>Paliwo</option>
<option>Jedzenie</option>
<option>Auto</option>
<option>Zakupy</option>
<option>Rozrywka</option>
<option>Rachunki</option>
<option>Inne</option>
</select>

<button class="primary" onclick="addExpense()">
Dodaj wydatek
</button>

</div>


<div class="card">

<h2>📋 Historia</h2>

<div id="history">
Brak wydatków
</div>

</div>
    
<div class="card">

<h2>Dodaj pieniądze</h2>

<input id="amount" placeholder="Kwota" type="number">

<button class="primary" onclick="addMoney()">
➕ Dodaj wpływ
</button>

<button onclick="removeMoney()">
➖ Dodaj wydatek
</button>

</div>


<script>

let money = Number(localStorage.money || 0);

let goal = Number(localStorage.goal || 0);


function update(){

document.getElementById("money").innerHTML =
money + " zł";

localStorage.money = money;


if(goal > 0){

let percent = Math.min((money/goal)*100,100);

document.getElementById("bar").style.width =
percent+"%";

}

}


function addMoney(){

money += Number(document.getElementById("amount").value);

update();

}


function removeMoney(){

money -= Number(document.getElementById("amount").value);

update();

}


function saveGoal(){

goal = Number(document.getElementById("goalValue").value);

localStorage.goal = goal;

document.getElementById("goalText").innerHTML =
"Cel: "+
document.getElementById("goalName").value+
" - "+
goal+
" zł";

update();

}

let expenses = JSON.parse(localStorage.expenses || "[]");


function addExpense(){

let name =
document.getElementById("expenseName").value;

let amount =
Number(document.getElementById("expenseAmount").value);

let category =
document.getElementById("category").value;


expenses.push({
name:name,
amount:amount,
category:category,
date:new Date().toLocaleDateString()
});


money -= amount;


localStorage.expenses =
JSON.stringify(expenses);


update();
showHistory();

}



function showHistory(){

let box =
document.getElementById("history");


if(expenses.length===0){
box.innerHTML="Brak wydatków";
return;
}


box.innerHTML =
expenses.map(e=>`

<p>
<b>${e.name}</b><br>
${e.category}
<br>
-${e.amount} zł
<br>
${e.date}
</p>

`).join("");

}


showHistory();
update();

</script>

</body>
</html>
