<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kapitał AI</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

</head>


<body>


<header>

<h1>💰 Kapitał AI</h1>

</header>



<main>


<section id="home" class="page active">


<div class="card">

<h2>Twój majątek</h2>

<div id="money" class="balance">
0 zł
</div>


<p id="dailyLimit">
💳 Limit dzienny: -
</p>


</div>



<div class="card">

<h2>🎯 Cel</h2>

<p id="goalInfo">
Brak celu
</p>

</div>



<div class="card">

<h2>📊 Analiza</h2>

<p id="summary">
Brak danych
</p>

</div>



<div class="card">

<h2>🤖 AI Doradca</h2>

<p id="aiAdvice">
Czekam na dane...
</p>

</div>



</section>





<section id="expenses" class="page">


<div class="card">

<h2>💸 Dodaj wydatek</h2>


<input id="expenseName" placeholder="Nazwa">


<input id="expenseAmount" type="number" placeholder="Kwota">


<select id="category">

<option>Paliwo</option>

<option>Jedzenie</option>

<option>Auto</option>

<option>Zakupy</option>

<option>Rachunki</option>

<option>Inne</option>

</select>


<button onclick="addExpense()">

Dodaj

</button>


</div>


<div class="card">

<h2>Historia</h2>

<div id="history">

Brak wydatków

</div>


</div>


</section>






<section id="goals" class="page">


<div class="card">

<h2>🎯 Cele</h2>


<input id="goalName" placeholder="Nazwa celu">


<input id="goalValue" type="number" placeholder="Kwota">


<button onclick="saveGoal()">

Zapisz cel

</button>


</div>


</section>







<section id="analysis" class="page">


<div class="card">

<h2>📊 Analiza</h2>

<p id="analysisText">

Brak danych

</p>


</div>


</section>







<section id="ai" class="page">


<div class="card">

<h2>🤖 AI Doradca</h2>


<p id="aiFull">

Czekam na analizę...

</p>


</div>


</section>





</main>





<nav class="menu">


<button onclick="showPage('home')">
🏠
</button>


<button onclick="showPage('expenses')">
💸
</button>


<button onclick="showPage('analysis')">
📊
</button>


<button onclick="showPage('goals')">
🎯
</button>


<button onclick="showPage('ai')">
🤖
</button>


</nav>





<script src="storage.js"></script>

<script src="ai.js"></script>

<script src="charts.js"></script>

<script src="app.js"></script>


</body>

</html>
